<script>
var P=[
{d:1,p:"science",c:"#1D9E75",t:"Feeding 10 Billion — The Chemistry Behind Modern Food Security",s:"Brand anchor post — global food mission statement",concept:"Open the month with a powerful, data-driven post establishing your place in the global food security mission. This is your 'why we exist' post told through the lens of global humanity — not just agriculture. Fortune 500 annual report quality visual that commands authority and inspires purpose.",visual:"Dark midnight-blue premium background. CENTER: A photorealistic Earth globe with crop field textures visible — agricultural greens and golden wheat tones glowing from the continents. Overlaid clean white sans-serif stat: 'The world needs 70% more food by 2050.' Below: horizontal timeline strip 1950 → 2025 → 2050 with population figures (2.5B → 8B → 10B) shown as a rising white line graph. LEFT: Three glowing icon pillars — Soil Health, Crop Protection, Precision Nutrition — each with a 2-line description. RIGHT: Company tagline in premium gold lettering. Feels like a Fortune 500 annual report cover — authoritative, inspiring, global.",cap:"The world's population will reach 10 billion by 2050.\n\nThat means humanity needs to produce more food in the next 30 years than it has in the past 10,000 years combined — on the same amount of arable land.\n\nThis is the defining challenge of our era. And it begins in the soil.\n\nAt [Company Name], we exist to bridge the gap between where agriculture is today and where it needs to be tomorrow — through science, sustainability, and an unwavering commitment to the farmer.\n\nThis is not just our business. This is our responsibility.\n\n#GlobalFoodSecurity #FeedTheWorld #AgriculturalInnovation #FutureOfFarming",tags:["#FoodSecurity","#Agribusiness","#SustainableAgriculture","#2050FoodChallenge","#AgrochemicalInnovation"],fmt:"Premium Full-Screen Anchor Graphic",plt:"LinkedIn + Instagram + Twitter/X"},

{d:2,p:"science",c:"#1D9E75",t:"The Nutrient Deficiency Atlas — A Global Farmer's Diagnostic Guide",s:"8 nutrient deficiencies — complete visual reference system",concept:"A premium, magazine-quality infographic covering all 8 major nutrient deficiencies in one comprehensive post. International agronomy standard — the kind of content saved and reshared by agronomists, universities, and extension services worldwide. Establishes deep scientific credibility immediately.",visual:"Clean white editorial grid. HERO CENTER: A lush, healthy reference plant with perfect dark green leaves. Radiating outward: 8 directional panels each representing one nutrient — N=emerald badge, P=violet badge, K=amber badge, Ca=sky blue, Mg=teal, Fe=orange, Zn=coral, B=red. Each panel: botanical leaf symptom illustration, 3-word symptom summary, 8-word scientific cause. Bottom strip: 'Mobile vs Immobile Nutrients' comparison diagram. Typography inspired by Nature journal layouts — clean, authoritative, editorial.",cap:"Every plant communicates its distress through its leaves.\nThe question is — do you know the language?\n\n🟢 N — Yellowing from oldest leaves upward\n🟣 P — Purple-red discoloration, delayed maturity\n🟡 K — Scorched leaf margins, weak disease resistance\n🔵 Ca — Deformed new growth, blossom end rot\n🌊 Mg — Interveinal chlorosis on older leaves\n🟠 Fe — Yellow young leaves, green veins remain\n🔴 Zn — Small leaves, shortened internodes\n⚫ B — Cracked stems, death of growing points\n\nSave this guide. Share it with every agronomist in your network.\n\n#PlantNutrition #NutrientDeficiency #CropScience #Agronomy #PrecisionNutrition",tags:["#NutrientManagement","#CropHealth","#PlantScience","#GlobalAgriculture"],fmt:"Premium Editorial Infographic — Save & Share",plt:"LinkedIn + Instagram + ResearchGate"},

{d:3,p:"sustain",c:"#639922",t:"Our 2030 Sustainability Roadmap — Published, Committed, Measurable",s:"Corporate ESG transparency — 6-milestone commitment post",concept:"A thought-leadership post positioning the company as a responsible global corporate citizen. Shows measurable, time-bound commitments — not vague green messaging. Critical for international partnerships, ESG investment, and building regulatory trust across global markets.",visual:"Dark forest-green background with white and gold elements. VERTICAL ROADMAP from 2025–2030 designed as a premium document. Each year: large numbered node with measurable commitment. 2025: 100% recyclable packaging. 2026: 30% carbon footprint reduction. 2027: Zero single-use plastic. 2028: 50% bio-based active ingredients. 2029: Third-party verified soil health audit. 2030: Certified carbon neutral operations. Background: subtle topographic map lines suggesting global reach. Bottom: Three UN SDG badges — SDG 2, 12, 13. Architecture firm meets sustainability report aesthetic.",cap:"Sustainability is not a marketing claim. It is a contract.\n\nToday, we publish our 2030 Sustainability Roadmap — six milestones, six years, fully measurable and publicly accountable.\n\n📌 2025 — 100% recyclable packaging\n📌 2026 — 30% carbon footprint reduction\n📌 2027 — Zero single-use plastics\n📌 2028 — 50% bio-based active ingredients\n📌 2029 — Third-party verified soil health impact\n📌 2030 — Certified carbon neutral operations\n\nWe invite our partners, customers, and competitors to hold us accountable.\n\nBecause if we are not part of the solution, we are part of the problem.\n\n#Sustainability #ESG #CarbonNeutral #SDG #AgriculturalSustainability",tags:["#2030Goals","#CorporateResponsibility","#ClimateAction","#GreenAgriculture","#ESGLeadership"],fmt:"Corporate ESG Roadmap Graphic",plt:"LinkedIn + Company Website + Twitter/X"},

{d:4,p:"pest",c:"#D85A30",t:"The Global Pest Threat Map — What's Destroying Crops Right Now",s:"International crop pest intelligence map — data-driven authority post",concept:"Position the brand as a global intelligence source on pest threats. Agronomists, policymakers, and farming organizations worldwide engage with this data. Elevates brand to 'global expert authority' status and earns reshares from FAO, CGIAR, and agricultural institutions.",visual:"World map as central hero — dark navy background with luminous green agricultural zones highlighted across all continents. 8 glowing red hotspot indicators on current outbreak regions. Each hotspot: callout box showing pest name, affected crop, annual estimated loss, affected countries. Examples: Fall Armyworm (Africa/maize/$9.4B), Brown Planthopper (South Asia/rice/50M tonnes at risk), Desert Locust (East Africa/cereals), Spotted Wing Drosophila (Europe/soft fruit/€500M). Map has cartographic precision — looks like an intelligence briefing or Nature journal spread.",cap:"Right now, while you read this — these pests are destroying crops across six continents.\n\n🌍 Fall Armyworm — Sub-Saharan Africa — $9.4B annual loss to maize alone\n🌏 Brown Planthopper — South Asia — 50+ million tonnes of rice at risk\n🌎 Fall Armyworm — Latin America — now resistant to 6 chemical classes\n🇪🇺 Spotted Wing Drosophila — Europe — soft fruit losses exceeding €500M\n🦗 Desert Locust — East Africa — single swarm eats enough for 35,000 people daily\n\nGlobal crop protection is not optional. It is civilizational.\n\nOur science exists to protect the world's most vulnerable food systems.\n\n#GlobalPestAlert #CropProtection #FoodSecurity #FAW #AgriIntelligence",tags:["#GlobalAgriculture","#PestManagement","#CropLoss","#FoodChain","#AgronomyGlobal"],fmt:"Data Intelligence Map Graphic",plt:"LinkedIn + Twitter/X + Instagram"},

{d:5,p:"food",c:"#D4537E",t:"733 Million People Go to Bed Hungry Tonight",s:"World hunger awareness — SDG 2 alignment campaign post",concept:"Deeply human, emotionally resonant post connecting your science to the most urgent human problem on earth. Aligned with UN SDG 2 (Zero Hunger). Positions brand as part of humanity's most important mission. Generates enormous international goodwill and engagement.",visual:"Documentary photography aesthetic. BACKGROUND: Three horizontal bands representing global regions — dry Sub-Saharan savanna, flooded South Asian rice paddy, drought-cracked Latin American soil — all in muted, desaturated tones evoking vulnerability. Semi-transparent dark vignette overlay. CENTER TEXT: Large clean white typography — '733 Million' in 48pt bold, followed by 'people face acute hunger today' in 18pt light. Below: a single burning amber candle illustration representing hope. BOTTOM DATA STRIP: '40% of food loss happens before harvest' and 'Effective crop protection could feed 200M more people.' National Geographic meets Bloomberg Philanthropies campaign quality.",cap:"733 million people will go to sleep hungry tonight.\n\nNot because the world doesn't produce enough food. But because 40% of what is grown is lost before it reaches a plate — to pests, disease, and crop failure.\n\nEffective, accessible, science-backed crop protection is not a luxury. For hundreds of millions of farming families, it is the difference between food and hunger.\n\nThis is why we do what we do. Not just to grow better crops. But to build a world where no one goes to bed hungry.\n\nWhat role will your organization play in closing this gap?\n\n#ZeroHunger #SDG2 #WorldFoodDay #FoodSecurity #GlobalAgriculture",tags:["#HungerFreeWorld","#FoodLoss","#CropProtection","#GlobalImpact","#WFP"],fmt:"Campaign-Grade Awareness Graphic — Priority Post",plt:"All Global Platforms"},

{d:6,p:"farmer",c:"#534AB7",t:"Kenya. Vietnam. Brazil. — Farmers Speak One Universal Language",s:"Global farmer solidarity — cross-cultural human connection post",concept:"The most emotionally powerful content type: showing that farmers everywhere share the same hopes and dignity regardless of geography. Builds global empathy and positions your brand as a worldwide ally of the farmer. Extremely high shareability across all cultures.",visual:"Triptych layout — three equal vertical panels separated by thin gold lines. LEFT: Kenyan maize farmer — terracotta tones, red earth, bright African sky. Beautiful portrait illustration of a woman farmer holding healthy maize cobs, sunrise behind her. Text: 'Amara grows maize for a family of 7. A pest-free harvest means school fees paid.' CENTER: Vietnamese rice farmer — lush emerald paddy terraces, morning mist, conical hat. 'Minh has farmed the same terraces for 30 years. A good season feeds his entire village.' RIGHT: Brazilian soybean farmer — vast golden horizon. 'Carlos farms 200 hectares. His crop feeds protein demand across three continents.' ALL THREE: Same sun rising above each scene. Bottom: 'Three continents. One common hope — a good harvest.'",cap:"A farmer in Kisumu, Kenya wakes at 5 AM to check her maize for fall armyworm.\nA farmer in Mekong Delta, Vietnam watches monsoon clouds approach his paddy.\nA farmer in Mato Grosso, Brazil scouts his soybean fields before the sun gets too hot.\n\nDifferent languages. Different crops. Different climates.\nBut the same hope — that today's care will become tomorrow's harvest.\n\nAt [Company Name], we have one customer.\nThe farmer. Every farmer. Everywhere.\n\nWho is the farmer in your life? Tell us below.\n\n#GlobalFarmer #FarmerFirst #WorldAgriculture #FarmingLife #AgriWithPurpose",tags:["#FarmerSolidarity","#WorldFarmers","#AgricultureGlobal","#FoodHeroes"],fmt:"Triptych Storytelling Graphic",plt:"LinkedIn + Instagram + Facebook"},

{d:7,p:"brand",c:"#BA7517",t:"Why the Agrochemical Industry Must Reinvent Itself — Now",s:"Bold industry thought leadership — provocative opinion piece",concept:"Provocative thought leadership that takes a critical look at the industry's own shortcomings and positions your company as the voice of progressive change. Generates enormous LinkedIn engagement from professionals, investors, and media. Shows intellectual courage and moral leadership.",visual:"Editorial magazine cover aesthetic. Premium cream-white background with strong typography hierarchy. MAIN VISUAL: Dramatic contrast between an old rusted conventional spray pump (representing the old industry model) next to a sleek modern precision drone (representing the future). '1962' marked on pump (year of Silent Spring — the book that started the chemical industry debate), '2030' on the drone. Large headline: 'The industry that feeds the world must also heal it.' Subtext: 'Our 5-point manifesto for responsible agrochemical practice.' Feels like Harvard Business Review meets MIT Technology Review.",cap:"Let me say something the agrochemical industry rarely says:\n\nWe have not always gotten it right.\n\nFor decades, the focus was yield above all. Volume above all. Sales above all. The soil paid the price. The farmer paid the price. The ecosystem paid the price.\n\nThe next era demands something different:\n1. Products designed to minimize, not maximize chemical input\n2. Full life-cycle transparency — from synthesis to soil breakdown\n3. Equal access — smallholder farmers deserve the same science as industrial operators\n4. Soil health as a product KPI, not just an afterthought\n5. Circular packaging. Zero residue. No compromise.\n\nThis is the standard we hold ourselves to. We invite the entire industry to join us.\n\n#IndustryReform #AgrochemicalFuture #ResponsibleBusiness #ThoughtLeadership",tags:["#AgriBusiness","#Sustainability","#Innovation","#ESG","#BoldLeadership"],fmt:"Thought Leadership Opinion Graphic",plt:"LinkedIn — Primary, Twitter/X"},

{d:8,p:"science",c:"#1D9E75",t:"IPM — The Global Gold Standard of Modern Crop Protection",s:"Integrated Pest Management pyramid — WHO & FAO endorsed framework",concept:"Establish scientific authority by presenting the globally accepted IPM framework in the most elegant, understandable visual ever created for this topic. Gets reshared by universities, agricultural colleges, and international extension services. Defines your brand as science-led.",visual:"Premium 5-tier pyramid on soft cream background with precise 3D perspective illustration. TIER 1 BASE, forest green — widest: 'Prevention & Monitoring — Crop rotation, resistant varieties, field scouting, pheromone traps.' TIER 2 olive: 'Cultural Controls — Sanitation, planting timing, companion crops, physical barriers.' TIER 3 amber: 'Biological Controls — Beneficial insects, microbial agents, Trichogramma, Bt.' TIER 4 coral: 'Low-Risk Pesticides — Neem derivatives, insecticidal soaps, selective botanicals.' TIER 5 APEX dark red — smallest: 'Targeted Synthetic Pesticides — Last resort. Precise. Justified.' Right side: cost curve decreasing toward base. Left side: environmental impact curve same trend. WHO + FAO endorsement badges at bottom.",cap:"The science is clear. The evidence is overwhelming.\n\nIntegrated Pest Management (IPM) is the internationally recognized gold standard of responsible crop protection — endorsed by the WHO, FAO, and agricultural ministries in 140 countries.\n\nIPM works through five defense layers:\n🟢 Prevention first — always\n🟡 Cultural intelligence — use biology against pests\n🟠 Biological allies — nature's own pest killers\n🔴 Low-risk botanicals — before synthetic chemistry\n⚫ Targeted chemistry — precise, time-limited, justified last resort\n\nResult: Up to 50% less pesticide. Same or better yield. Healthier soil. Lower cost.\n\nThis is the standard every product we design is built around.\n\n#IPM #IntegratedPestManagement #CropScience #WHO #FAO #Agronomy",tags:["#SustainableFarming","#PestControl","#AgriScience","#CropProtection"],fmt:"Scientific Pyramid Infographic",plt:"LinkedIn + Instagram + ResearchGate"},

{d:9,p:"nature",c:"#185FA5",t:"The Living Soil — Why What's Underground Matters More Than Above",s:"Soil microbiome science — premium cinematic educational visual",concept:"Elevate the brand's scientific storytelling with a deep-dive into soil biology. Trending globally in the agricultural science community and among sustainability advocates. Beautiful, authoritative content that positions the brand at the frontier of biological understanding.",visual:"Cinematic underground cross-section illustration — the most beautifully rendered version of this concept. ABOVE GROUND: Photorealistic crops in golden sunlight, root tips visible below surface. UNDERGROUND WORLD: Richly illustrated ecosystem — vast fungal mycorrhizal networks as glowing white threads connecting every root, labeled 'Nature's Internet.' Nitrogen-fixing bacteria as glowing blue clusters at legume root nodules. Earthworms creating biopores labeled 'Natural aerators.' Phosphorus-solubilizing bacteria glowing near mineral particles. SCALE INDICATOR: 'This teaspoon of healthy soil contains 1 billion bacteria, 200 metres of fungal threads, and thousands of species.' Warm earth browns, vibrant greens, bioluminescent microorganism accents. National Geographic quality.",cap:"The most important ecosystem on Earth is the one you cannot see.\n\nA single teaspoon of healthy soil contains:\n• 1 billion bacteria\n• 200 metres of fungal threads\n• Thousands of protozoa, nematodes, and microarthropods\n• More organisms than there are humans on Earth\n\nThis underground community does something extraordinary:\n🌱 Fixes atmospheric nitrogen — reducing fertilizer need\n🍄 Connects plants via mycorrhizal networks — sharing nutrients\n🪱 Aerates compacted earth — improving water infiltration\n🧫 Suppresses soil-borne diseases — naturally\n\nEvery product we make has one non-negotiable criterion:\nIt must work WITH this living system, not against it.\n\n#SoilHealth #SoilMicrobiome #LivingSoil #SoilScience #RegenerativeAgriculture",tags:["#Microbiome","#SoilBiology","#SustainableSoil","#NatureForward","#AgriScience"],fmt:"Premium Cinematic Illustration",plt:"Instagram + LinkedIn + Pinterest"},

{d:10,p:"science",c:"#1D9E75",t:"From Lab to Field — How a New Crop Protection Molecule is Born",s:"R&D transparency — the extraordinary 11-year science journey",concept:"Pull back the curtain on agrochemical R&D. The industry suffers from opacity. This transparency builds profound trust with farmers, consumers, investors, and regulators simultaneously. Shows the extraordinary scientific rigor behind every product on every label.",visual:"Horizontal pipeline infographic with laboratory-aesthetic design on clean white. Precise scientific illustration style. STAGES left to right in rounded boxes with connecting arrows: DISCOVERY — molecule structure diagram, '10,000+ compounds screened.' SAFETY ASSESSMENT — shield icon, '1,200+ safety tests over 4–6 years.' EFFICACY TRIALS — field illustration, 'Tested across 50+ crops in 30+ countries.' REGULATORY APPROVAL — government building, 'Reviewed by 20+ authorities globally.' STEWARDSHIP — leaf plus farmer icon, 'Training, residue monitoring.' TIMELINE BANNER: 'Average: 11 years and $286 million per molecule.' Bottom: 'Only 1 in 160,000 molecules becomes a registered product.' Creates profound respect for the science.",cap:"Before a single drop of crop protection product reaches a farmer's field, it travels an extraordinary journey.\n\n⚗️ Discovery: 10,000+ candidate molecules screened\n🔬 Safety Testing: 1,200+ laboratory studies over 4–6 years\n🌾 Field Trials: Tested on 50+ crops across 30+ countries\n🏛️ Regulatory Review: Assessed by up to 20 government agencies\n💰 Investment: $286 million average development cost per molecule\n\nOnly 1 in 160,000 tested molecules ever becomes a registered product.\n\nThis is the science behind safety. This is why you can trust the label.\n\nDo you have questions about how a product's safety is assessed? Ask us below.\n\n#AgrochemicalScience #ProductSafety #RegulatoryCompliance #AgriRD #TrustTheLabel",tags:["#CropScience","#Transparency","#AgriInnovation","#ScienceExplained","#FoodSafety"],fmt:"R&D Pipeline Process Infographic",plt:"LinkedIn + Instagram + Company Blog"},

{d:11,p:"sustain",c:"#639922",t:"Precision Agriculture — Using Less to Grow More",s:"Technology meets agronomy — the global precision farming revolution",concept:"Position the brand at the cutting edge of agriculture's technology revolution. Precision agriculture is the global future — drones, AI-powered scouting, variable rate application. Show your products are engineered for this future, not the past. Attracts tech-forward farmers and investors.",visual:"Split layout visual. LEFT HALF: Traditional broad-spray application — a conventional sprayer covering an entire field uniformly, chemical mist drifting in wind shown as subtle waste. Traditional amber-brown tones. RIGHT HALF: Precision application — autonomous drone flying low, applying micro-targeted spray only on GPS-mapped pest hotspots while the rest of the field remains healthy green. CENTER: A tablet showing a field heat-map with red pest pressure zones against green field. OVERLAID STATS: '30% less pesticide. 40% less water. Zero drift. Same protection.' TOP: 'The future of crop protection is precise.' Technological teal-blue on right.",cap:"The next revolution in agriculture isn't about more — it's about better.\n\nPrecision Agriculture is reshaping crop protection globally:\n🛸 Drone-based targeted spraying: 30% less pesticide volume\n📡 Remote sensing + AI pest mapping: spray only where needed\n🌡️ IoT soil sensors: apply nutrients at exactly the right moment\n🧬 Predictive disease modeling: treat before the outbreak\n🗺️ Variable rate application: every square metre gets exactly what it needs\n\nResult:\n✅ Significantly reduced chemical input\n✅ Lower farm operational costs\n✅ Reduced environmental footprint\n✅ Traceable, auditable application records\n\nOur formulations are engineered to perform optimally in precision delivery systems.\nThe future is precise. We are ready.\n\n#PrecisionAgriculture #AgriTech #DroneAgriculture #SmartFarming",tags:["#AgTech","#Drones","#AIAgriculture","#PrecisionFarming","#Innovation"],fmt:"Tech-Forward Comparison Infographic",plt:"LinkedIn + Instagram + Twitter/X"},

{d:12,p:"pest",c:"#D85A30",t:"Fall Armyworm — The Most Destructive Migratory Pest in the World",s:"Global pest deep-dive — scientific documentary format",concept:"Comprehensive, globally authoritative post on the world's most significant invasive agricultural pest. The kind of scientific content agronomists, policymakers, and farming organizations worldwide share and reference. Establishes brand as a global crop protection intelligence source.",visual:"Scientific documentary visual aesthetic. BACKGROUND: Maize field at dusk — half vibrant green, half showing characteristic ragged window-pane FAW damage. HERO IMAGE: Large hyperrealistic botanical illustration of FAW larva on maize leaf — scientific accuracy showing distinctive inverted 'Y' on head capsule, 4 black spots on 8th abdominal segment. Circle callout shows adult moth for comparison. INSET MIGRATION MAP: World map showing FAW's devastating spread — Americas (origin) → Africa 2016 → Asia 2018 → 100+ countries today. Damage stats overlaid: '$9.4 billion annual crop losses in Africa alone.' Bottom: Illustrated scouting guide — egg masses, window-pane feeding, frass in whorl. Documentary gold-green palette with scientific precision.",cap:"Since 2016, one pest has changed agriculture across three continents.\n\nFall Armyworm (Spodoptera frugiperda) — the most destructive migratory pest in modern history.\n\n📍 Origin: The Americas\n🌍 2016: First detected in Africa → devastated 47 countries in 12 months\n🌏 2018: Spread across South and Southeast Asia\n🌐 Today: Present in 100+ countries across all continents\n\n💥 Annual damage: $9.4 billion in Africa alone\n🌽 Primary targets: Maize, sorghum, wheat, rice\n\nHow to identify FAW:\n🔍 Inverted 'Y' mark on larval head capsule\n🔍 4 black spots on 8th abdominal segment\n🔍 Window-pane feeding damage on leaves\n🔍 Granular frass (excrement) visible in plant whorl\n\nScout weekly. Act within the first 3 larval instars.\n\n#FallArmyworm #FAW #GlobalPest #CropProtection #Spodoptera",tags:["#PestAlert","#MaizePest","#CropLoss","#IPMGlobal","#GlobalFarming"],fmt:"Scientific Documentary Infographic",plt:"LinkedIn + All Platforms"},

{d:13,p:"farmer",c:"#534AB7",t:"Meet Maria — A Coffee Farmer in Colombia Who Changed Her Entire Valley",s:"International farmer transformation story — premium long-form narrative",concept:"A beautifully told individual farmer story that transcends borders. Maria's coffee farming transformation resonates with coffee drinkers worldwide, the agricultural community, and ESG-focused investors. Content that creates lasting emotional bridges across cultures.",visual:"Premium lifestyle photography aesthetic as illustration. SETTING: Colombian coffee highlands at dawn — misty mountains, lush green hillsides with neat rows of coffee plants. HERO: Maria Gutierrez, 42, standing between coffee rows in morning golden light — dignified, strong, proud. She holds red coffee cherries in cupped hands. RIGHT SIDE: Three-panel story timeline — (1) 2018: Coffee leaf rust devastated her plantation — 60% crop loss — desaturated, struggling plants. (2) 2019: Adopted IPM plus copper-based fungicide program plus shade-grown techniques. (3) 2023: 180% yield recovery. Her system adopted by 47 neighboring farms. Final panel: Maria teaching other women farmers in her valley. National Geographic quality illustration.",cap:"Maria Gutierrez has farmed the mountains of Huila, Colombia for 22 years.\n\nIn 2018, coffee leaf rust (Hemileia vastatrix) destroyed 60% of her plantation. She did not give up.\n\nWorking with local agronomists, Maria adopted an integrated approach:\n→ Regular scouting and early detection protocols\n→ Copper-based fungicide at the first sign of infection\n→ Shade tree intercropping to reduce humidity and spore spread\n→ Resistant varieties for replanting\n\nBy 2023: 180% yield recovery.\nHer system has been adopted by 47 neighbouring farms.\nShe now leads a women's cooperative serving 3 specialty coffee roasters in Europe.\n\nOne farmer. One decision. One valley transformed.\nThis is what good agronomy makes possible.\n\n#FarmerStory #CoffeeFarmer #ColombiaCoffee #WomenInAgriculture #AgriImpact",tags:["#FarmerFirst","#GlobalFarmer","#CoffeeIndustry","#WomenFarmers","#TransformationStory"],fmt:"Premium Narrative Story Post",plt:"Instagram + LinkedIn + Facebook"},

{d:14,p:"safety",c:"#E24B4A",t:"The MRL — Your Food's Invisible Global Safety Standard",s:"Consumer food safety education — Maximum Residue Levels explained",concept:"Bridge the gap between the farmer/agrochemical world and the urban consumer. MRL is one of the most misunderstood topics globally. Clear, science-based explanation builds enormous public trust. Directly addresses 'chemicals in food' fears with peer-reviewed science.",visual:"Clean consumer-facing editorial design. CENTRAL ILLUSTRATION: A fresh photorealistic apple cross-section — crisp white flesh, perfect red skin. Surrounding the apple: concentric safety rings labeled outward. INNERMOST RING dark green: 'Actual pesticide residue on washed retail apple — 0.001 mg/kg.' NEXT RING green: 'MRL — Legal Maximum Allowed — 0.1 mg/kg.' NEXT RING amber: '100x Safety Buffer — AOEL.' OUTER RING red: 'Harm Threshold — would require eating 10,000 apples/day.' RIGHT SIDE: 4-step infographic strip — 'How MRLs are set: Animal toxicology → Human exposure assessment → 100x Safety factor applied → Regulatory committee global review.' Clean white, scientific green, food safety blue color palette.",cap:"Every time someone worries about 'chemicals on food' — the concern is legitimate.\nBut here is what the science says.\n\nMaximum Residue Levels (MRLs) are the legally binding maximum concentrations of pesticide residue permitted on food.\n\nHow they work:\n🔬 Scientists establish the dose at which a substance causes NO effect (NOAEL)\n➗ Divide by 100 for human safety buffer\n➗ Divide by 10 again for children and vulnerable populations\n✅ The MRL is set BELOW that already-conservative number\n\nFor context: To reach a harmful dose from food at MRL, an average adult would need to eat thousands of servings per day — for an entire lifetime.\n\nThis is global food safety science. This is why you can trust your food.\n\n#MRL #FoodSafety #PesticideResidues #ScienceExplained #ConsumerTrust",tags:["#FoodScience","#RegulatoryScience","#SafeFood","#TrustTheProcess","#WHO"],fmt:"Consumer Education Infographic",plt:"Instagram + LinkedIn + Facebook"},

{d:15,p:"sustain",c:"#639922",t:"The Pollinator Crisis — What Our Industry Must Do About It",s:"Bee conservation — honest industry accountability post",concept:"One of the most powerful credibility-building posts possible: honestly acknowledging the industry's impact on pollinators and committing to concrete action. The global agricultural world needs brands brave enough to have this conversation publicly. Bold, honest, responsible.",visual:"Breathtaking nature illustration. SPLIT VISUAL: LEFT — thriving wildflower meadow border alongside a crop field, abundant with honeybees, bumblebees, butterflies, and hover flies. Warm golden vibrant tones. RIGHT — same field treated without pollinator consideration: empty, silent, few flowers, no insects. Profound silence visible in the image. CENTER: Single honeybee illustrated with scientific precision showing pollen-loaded corbiculae (pollen baskets). STAT OVERLAY: '75% of global food crops depend on pollinators.' BELOW: Five brand commitments — PMPs (Pollinator Management Plans), spray-timing windows, buffer zone protocols, wildflower corridor program, neonicotinoid stewardship standards. Emotionally honest visual.",cap:"We need to have an honest conversation.\n\nPollinators are in crisis.\n75% of the world's flowering plants — and 35% of global food production — depend on them.\nBee populations have declined by 45% in parts of Europe and North America since 1990.\n\nThe agrochemical industry has contributed to this problem. We acknowledge that.\n\nAnd we are committed to being part of the solution:\n🐝 No product launch without full pollinator risk assessment\n🌸 Wildflower corridor program — 500 participating farms by 2026\n🕐 Mandatory spray-timing guidance: after bee foraging hours\n🚫 Transparent communication on neonicotinoid restrictions\n📋 Pollinator Management Plans included with every product sale\n\nBees don't just make honey. They make food possible.\nAnd we have an obligation to protect them.\n\n#SaveTheBees #PollinatorProtection #BeeFriendly #Sustainability #AgriculturalResponsibility",tags:["#Bees","#Pollinators","#BeeConservation","#EnvironmentalResponsibility","#Neonicotinoids"],fmt:"Nature Conservation Statement Post",plt:"Instagram + LinkedIn + All Platforms"},

{d:16,p:"food",c:"#D4537E",t:"The $1 Trillion Food Loss Problem — Agriculture's Role in Solving It",s:"Global food loss systems thinking — data journalism style post",concept:"Food loss at the farm level connects crop protection directly to a cause consumers globally care about. Positioning your brand in this pre-harvest food loss prevention conversation is powerful, globally relevant, and builds public goodwill beyond the agricultural industry.",visual:"Economist magazine data visualization aesthetic. HEADER: A grain silo with a bold 40% portion shown in dark red — labeled 'Lost before it reaches a plate.' MAIN BODY: Sankey flow diagram showing global food production pipeline — food grown 100% → post-harvest loss 14% → processing loss 9% → retail loss 8% → consumer waste 17% = only 52% consumed. Farm-level loss sections highlighted in bold color — 'This is where agrochemical science saves food.' SIDE STAT: '1 billion tonnes of food lost to pests and disease annually.' Company impact statement: 'Every field we protect puts more food on more plates.' Clean, authoritative data journalism.",cap:"$1 trillion.\n\nThat is the annual value of food lost globally — before it ever reaches a consumer.\n\nWhere it disappears:\n📦 14% lost at harvest — pest damage, disease, poor timing\n🏭 9% lost in processing — contamination, quality failure\n🏪 8% lost at retail — cosmetic standards, shelf life issues\n🏠 17% lost by consumers — over-purchasing, improper storage\n\nThe largest leverage point is at the farm — before harvest.\n\nEffective crop protection is not just about yield. It is about ensuring that what farmers grow actually reaches the people who need it.\n\nWhen we protect a crop from disease or pest, we are not just protecting a farmer's income. We are protecting the food security of the family at the end of that supply chain.\n\n#FoodLoss #FoodWaste #GlobalFood #FoodSystem #HarvestProtection",tags:["#FoodSecurity","#SDG12","#FoodLoss","#CropProtection"],fmt:"Data Journalism Infographic",plt:"LinkedIn + Twitter/X + Instagram"},

{d:17,p:"nature",c:"#185FA5",t:"Biopesticides — The Science of Letting Nature Protect Nature",s:"Biological crop protection revolution — future-forward science post",concept:"Biopesticides are the fastest-growing segment of crop protection globally at $10B+ market value. Positions your brand as forward-thinking and nature-aligned. Appeals to both conventional and organic farming communities. Science-forward yet deeply nature-rooted.",visual:"Split science-nature visual. LEFT HALF organic: beautiful macro botanical illustrations of biological agents — Bacillus thuringiensis bacteria as microscopic rods, Trichoderma fungal spores, Beauveria bassiana threads attacking insect cuticle, neem tree branches. Watercolor illustration meets scientific accuracy. RIGHT HALF clean scientific: laboratory beakers, microscope imagery, product formulation vessels — showing industrial translation of natural organisms into stable, scalable products. CENTER BRIDGE: Arrow flowing 'Found in Nature → Formulated for Fields — 4 billion years of natural evolution, harnessed by modern science.' Botanical greens, laboratory white, earthy amber palette.",cap:"Nature has been protecting crops for 4 billion years.\nWe are only just learning to work with her.\n\nBiopesticides — derived from naturally occurring organisms:\n\n🦠 Bacillus thuringiensis (Bt): Soil bacterium producing proteins toxic to specific insects. Used safely since 1938.\n\n🍄 Trichoderma harzianum: Soil fungus preventing damping-off and root rot diseases.\n\n🐛 Beauveria bassiana: Entomopathogenic fungus infecting 700+ pest species — naturally.\n\n🌿 Neem azadirachtin: Natural insect growth regulator — disrupts molting, prevents reproduction.\n\nThe global biopesticide market is growing at 15% annually — the fastest in crop protection.\n\nNature designed these solutions over billions of years. Our science makes them accessible to every farmer.\n\n#Biopesticides #BiologicalControl #NaturalFarming #CropProtection #GreenScience",tags:["#Biocontrol","#NaturalPesticide","#OrganicFarming","#AgriScience","#BioBasedSolutions"],fmt:"Botanical Science Illustration Post",plt:"LinkedIn + Instagram + Pinterest"},

{d:18,p:"science",c:"#1D9E75",t:"Climate Change is Shifting Pest Pressure — Here's the Global Data",s:"Climate impact on agriculture — science-backed international awareness post",concept:"A genuinely important and globally trending topic: how climate change is shifting pest and disease distribution patterns, expanding tropical pest ranges, and altering disease cycles. Makes the brand a global authority on emerging agricultural risks and climate-adaptive agronomy.",visual:"Scientific climate-agriculture data visualization. BACKGROUND: Subtle grayscale world map. MAIN VISUAL: Two overlapping maps — historical pest distribution zones (cooler, restricted, blue tones) and 2050 projected zones (dramatically expanded, warmer, red heat-map gradient). KEY FACTS side panels: 'Whitefly range expanded 400km northward in Europe since 2000.' 'For every 1C temperature rise, insects develop one extra generation per season.' 'Fall Armyworm now thriving at altitudes 1,500m higher than 1990.' Clean line chart showing temperature rise vs resistant pest species proliferation. Data sources cited: IPCC, FAO, Nature Climate Change. Authoritative visual.",cap:"Climate change does not just affect weather.\nIt is fundamentally reshaping which pests and diseases exist — and where.\n\nThe data tells a stark story:\n🌡️ For every 1°C temperature rise, insects develop one extra generation per season\n🦟 Whitefly range has expanded 400km northward in Europe over 20 years\n🌍 Tropical pests are now established in regions where they couldn't survive a decade ago\n🍄 Fungal disease pressure has increased 23% in temperate regions since 2000\n🐛 Winter survival rates of overwintering pests have doubled in northern latitudes\n\nWhat does this mean for farmers?\nGreater unpredictability. New pest species. Changed spray windows. Different disease calendars.\n\nWhat does it mean for us?\nAn obligation to research faster and prepare farmers for a changing world.\n\n#ClimateChange #CropProtection #ClimateAndAgriculture #Agronomy",tags:["#IPCC","#ClimateAgriculture","#PestManagement","#GlobalWarming","#AgriScience"],fmt:"Scientific Climate Data Visualization",plt:"LinkedIn + Twitter/X + Instagram"},

{d:19,p:"farmer",c:"#534AB7",t:"The Smallholder Farmer — 500 Million Families Feeding the World",s:"Global agricultural equity and access — human impact post",concept:"Shine a powerful light on the people who grow most of the world's food but receive the least support. Creates deep emotional resonance globally and positions the brand as a champion of agricultural equity — not just corporate profitability. A brand-defining values post.",visual:"Data visualization meets human storytelling. MAIN VISUAL: The Earth from above, with 500 million tiny glowing points of light distributed across Asia, Sub-Saharan Africa, Latin America, and South Asia — each light representing one smallholder farming family. Their collective glow is extraordinary — a reminder of vast, distributed human effort and dignity. DATA OVERLAY: 'Smallholder farmers — less than 2 hectares each — produce 70% of the food consumed in developing countries.' BOTTOM: Four illustrated smallholder farmer portraits from different continents — rice farmer (Bangladesh), vegetable farmer (Ethiopia), maize farmer (Guatemala), cassava farmer (Nigeria) — all dignified, skilled, proud. Brand statement: 'Equal access to crop science is not a luxury. It is a human right.'",cap:"500 million farming families.\nMost farming less than 2 hectares.\nCollectively feeding 70% of the developing world.\n\nThey are the backbone of global food security. And they are, too often, the last to receive access to quality crop protection science.\n\nThe average smallholder farmer in Sub-Saharan Africa loses 30–50% of their crop to preventable pests and disease.\n\nNot because the science to prevent those losses doesn't exist.\nBut because it hasn't reached them.\n\nThis is the access gap that drives our extension work, field advisory programs, and commitment to accessible, affordable formulations.\n\nBecause agricultural science that only serves industrial operators is not good enough.\n\nEvery farmer deserves the best crop science the world has developed. Full stop.\n\n#Smallholder #FoodEquity #AgriculturalAccess #FarmerFirst #GlobalFood",tags:["#SmallholderFarming","#FoodJustice","#500MillionFarmers","#AgriEquity","#WorldFarming"],fmt:"Impact Awareness Graphic — Global Campaign",plt:"LinkedIn + All Platforms"},

{d:20,p:"safety",c:"#E24B4A",t:"The WHO Hazard Classification — Decoding Every Pesticide Label",s:"Global pesticide safety framework — farmer and consumer education",concept:"Demystify one of the most important but least understood global safety frameworks. The WHO Hazard Classification governs every pesticide label worldwide. Makes your brand a trusted educator for farmers, retailers, and informed consumers across every market.",visual:"Clean, authoritative, near-governmental design aesthetic. CENTRAL VISUAL: A color band system showing the full WHO hazard classification — RED band (Class Ia — Extremely Hazardous), ORANGE band (Class Ib — Highly Hazardous), YELLOW band (Class II — Moderately Hazardous), GREEN band (Class III — Slightly Hazardous), BLUE band (Class U — Unlikely to Cause Harm under normal use). Each band: official color, Roman numeral, classification name, example product types, required PPE level. CENTER: Magnifying glass over a product label showing exactly where to find the WHO classification symbol. BOTTOM: PPE requirement matrix. WHO and FAO logos as endorsing authority. Clinical and precise typography.",cap:"Every pesticide in the world is classified by the World Health Organization on a hazard scale.\n\nDo you know what's on the labels in your store?\n\n🔴 Class Ia — Extremely Hazardous (restricted professional use, full protective equipment)\n🔴 Class Ib — Highly Hazardous (professional use only)\n🟡 Class II — Moderately Hazardous (protective clothing required)\n🟢 Class III — Slightly Hazardous (standard precautions sufficient)\n🔵 Class U — Unlikely to Cause Harm under normal use\n\nThis classification is printed on every registered product label globally.\n\nAt [Company Name], our portfolio is weighted toward Class III and U formulations — by design. Because the safest product that works is always our first choice.\n\nSave this. Share with every farmer and retailer you know.\n\n#WHOClassification #PesticideSafety #GlobalSafety #FarmerHealth",tags:["#WHO","#CropProtection","#SafeAgriculture","#PesticideLabel","#FoodSafety"],fmt:"Regulatory Safety Education Graphic — Priority",plt:"All Global Platforms"},

{d:21,p:"brand",c:"#BA7517",t:"What Does 'Sustainable Agrochemical' Actually Mean? Let's Be Precise.",s:"Anti-greenwash brand definition — cutting through industry noise",concept:"One of the boldest, most trust-building posts in the calendar. Call out greenwashing in the industry while defining exactly what your brand means by sustainability with specific, measurable criteria. The global agricultural science community and ESG investors will deeply respect this.",visual:"Editorial op-ed aesthetic — clean, typographic, authoritative on warm cream background. Two-column layout. LEFT COLUMN — 'What sustainability is NOT in our industry' in muted struck-through typography: 'A green logo on a chemical container.' 'Vague commitments with no metrics.' 'Organic-approved labels without full life-cycle examination.' 'Carbon offsetting without changing operations.' RIGHT COLUMN — 'What WE mean by sustainable' in confident green typography: 'Soil health measurably improved after 3 seasons of product use.' 'Biodegradation profile verified in soil and water.' 'Non-target organism safety demonstrated in field conditions.' 'Farmer health designed into formulation, not added as an afterthought.' CENTER DIVIDER: Single word — PRECISION — in 36pt bold. Brand signature below.",cap:"The word 'sustainable' has been used so freely in our industry that it is at risk of meaning nothing.\n\nLet us be precise about what it means at [Company Name]:\n\n✅ Sustainable means: our products measurably improve, not just maintain, soil health over a 3-season crop cycle.\n\n✅ Sustainable means: every formulation has a verified biodegradation profile in soil and aquatic environments.\n\n✅ Sustainable means: non-target organisms — beneficial insects, earthworms, soil microbes — are tested and protected.\n\n✅ Sustainable means: the farmer using our product is safer, not just the product's environmental profile.\n\n✅ Sustainable means: we publish the data. Publicly. Annually.\n\nGreen marketing without green metrics is just a color choice.\n\nHold us to this standard. Please.\n\n#Sustainability #AntiGreenwash #AgriTruth #ESG #ResponsibleBusiness",tags:["#Greenwashing","#SustainabilityStandards","#AgriTransparency","#ThoughtLeadership"],fmt:"Bold Opinion Editorial Graphic",plt:"LinkedIn — Primary, Twitter/X"},

{d:22,p:"nature",c:"#185FA5",t:"Regenerative Agriculture — Beyond Sustainable Toward Restorative",s:"Regenerative farming principles — the next global frontier post",concept:"'Sustainable' is becoming the minimum expectation. 'Regenerative' is the new frontier — farming that actively restores ecosystem function. Globally trending among progressive farmers, food companies, and ESG investors. Lead this conversation and define your brand's forward positioning.",visual:"Stunning transformation illustration with a 10-year arc showing recovery. BEFORE left side, desaturated and degraded: compacted pale soil, shallow roots, sparse earthworms, minimal microbial life, runoff visible, declining crop yields. AFTER right side, vibrant and alive: deep dark humus-rich soil, extensive root architecture, abundant earthworm channels, glowing mycorrhizal networks, high water retention, zero runoff, thriving healthy crop. CENTER RISING ARC: 'Year 1 — 3% organic matter. Year 10 — 8.5% organic matter. Carbon sequestered: 4 tonnes/hectare/year.' TOP TEXT: 'Sustainable farming says: cause no harm. Regenerative farming says: restore what was lost.' Documentary-grade earth tones — warm and alive on right, cool and depleted on left.",cap:"Sustainability sets the floor. Regeneration raises the ceiling.\n\nRegenerative agriculture goes beyond 'do less harm' — it actively rebuilds the natural systems that industrial farming has depleted over decades.\n\nThe five core principles:\n🌱 Keep the soil covered — always (cover crops, mulch, crop residue)\n🔄 Minimize soil disturbance — rethink your tillage approach\n🌾 Maximize plant diversity — end monoculture dependence\n🐄 Integrate livestock — their biology feeds the soil\n🌳 Maintain living roots year-round — never leave soil bare\n\nOutcomes measured over 5–10 years:\n📈 Soil organic matter increase: 2–6%\n💧 Water retention: up 40–60%\n🌡️ Carbon sequestered: 2–4 tonnes/hectare/year\n📊 Input costs: down 20–35% as soil health improves\n\nOur portfolio is being redesigned to support every one of these principles.\n\n#RegenerativeAgriculture #SoilCarbon #FutureOfFarming #RestorativeAgriculture",tags:["#Regenerative","#SoilHealth","#CarbonFarming","#Agroecology"],fmt:"Transformation Comparison Infographic",plt:"Instagram + LinkedIn + Pinterest"},

{d:23,p:"science",c:"#1D9E75",t:"Pesticide Resistance — The Arms Race We Must Win Together",s:"Resistance management — global scientific education and stewardship",concept:"Pesticide resistance is one of the most significant threats to global food security. This scientific post educates on the mechanism of resistance and establishes your brand as a global stewardship leader. The kind of content that earns citations from universities and international bodies.",visual:"Science textbook meets dramatic data visualization. MAIN ILLUSTRATION: An evolutionary timeline strip showing resistance development across 4 pest generations. GEN 1: 1,000 insects — 999 grey susceptible, 1 red carrying resistance gene. Chemical sprayed: all grey die. GEN 2: 10 insects, mostly red. GEN 3: 1,000 insects all red. Chemical sprayed: zero control. Shown with precision and impact. RIGHT PANEL: Global resistance map with data — 'Over 600 arthropod species now resistant to at least one pesticide class. Some to six or more.' BOTTOM: IRAC rotation strategy — Mode of Action groups A through M illustrated as a rotation wheel. Clinical white, scientific amber, alarm red palette. IRAC data sourced.",cap:"This is the most important concept in modern crop protection that most farmers never hear explained.\n\nIn any pest population of 1,000,000 individuals, perhaps 1 carries a natural mutation conferring resistance.\n\nApply the same pesticide:\n→ 999,999 susceptible insects die\n→ 1 resistant insect survives, reproduces — all offspring carry the resistance gene\n→ Repeat 6 cycles — the entire population is resistant\n\nGlobally: 600+ insect species are resistant to at least one chemical class.\n\nThe solution is Resistance Management — and it requires everyone to act together:\n✅ Rotate between different Modes of Action (IRAC groups)\n✅ Always use full recommended doses — never sub-lethal\n✅ Combine with biological and cultural methods\n✅ Monitor and report resistance cases to IRAC\n\n#ResistanceManagement #IRAC #PesticideResistance #CropScience",tags:["#InsecticideResistance","#MOA","#SmartSpraying","#AgriScience","#Stewardship"],fmt:"Scientific Education Infographic",plt:"LinkedIn + Instagram + ResearchGate"},

{d:24,p:"farmer",c:"#534AB7",t:"Women Grow the World — The Untold Story of Female Farmers",s:"Women in agriculture — global equity and empowerment campaign post",concept:"Women constitute 43% of the global agricultural workforce yet receive fewer resources, less credit, and less recognition. Powerful corporate values content generating enormous international engagement. Connects gender equity directly to measurable global food security outcomes.",visual:"Striking magazine-quality illustrated portrait series. Five full circular frames arranged in a pentagon — each showing a woman farmer in her cultural context: Indian woman inspecting cotton — vibrant sari against white cotton bolls at harvest. Ethiopian woman harvesting teff grain — graceful, dignified, traditional dress. Peruvian woman tending potato terraces on Andean slopes — ancient knowledge meets modern tools. Vietnamese woman managing modern vegetable greenhouse — technical, confident. American woman studying soil health in no-till cornfield — tablet in hand, precision farming context. All five: strong, skilled, proud, professional. CENTER: Globe illustration with text 'Women farmers produce 43% of the world's food — yet own less than 15% of its agricultural land.' National Geographic portrait quality.",cap:"The story of global food is largely a story of women.\n\n43% of the world's agricultural workforce is female.\nIn Sub-Saharan Africa, women produce up to 80% of domestically consumed food.\nIn Asia, women perform 60–80% of rice production labor.\n\nAnd yet:\n→ Women own less than 15% of agricultural land globally\n→ Receive less than 10% of agricultural credit\n→ Have less access to quality seeds, inputs, and market information\n\nFAO research shows: if women farmers had equal access to resources as men, they could increase yields by 20–30% — enough to reduce world hunger by 12–17%.\n\nEqual access to crop science is not a gender issue. It is a food security issue.\n\n[Company Name] is committed to gender-equal access in everything we do.\n\n#WomenInAgriculture #FoodEquity #GenderEquality #SDG5 #WomenFarmers",tags:["#FemaleAgri","#WomenGrowFood","#GenderEquity","#AgriculturalEquality","#FAO"],fmt:"Global Campaign Portrait Series",plt:"LinkedIn + Instagram + All Platforms"},

{d:25,p:"sustain",c:"#639922",t:"The Circular Farm — Zero Waste Agriculture in Practice",s:"Circular economy applied to farming — innovation and sustainability spotlight",concept:"A forward-looking, innovation-focused post on circular economy principles applied to agriculture. Globally relevant and trending. Positions the brand at the intersection of innovation and environmental responsibility. Attracts ESG investors and forward-thinking global customers.",visual:"A circular economy diagram rendered as a stunning round infographic with premium design. CENTRAL CIRCLE: Aerial view of a thriving crop field — perfectly circular. From the center: 6 flowing arrows forming a continuous outer ring — each representing a circular flow illustrated and labeled: Crop residues → Compost → Soil enrichment. Pesticide containers → Collection scheme → Recycled plastic. Irrigation runoff → Capture → Recirculated. Cover crop seeds → Next season disease suppression. Livestock waste → Biodigester → Energy and biofertilizer. Harvest waste → Biochar → Carbon sequestration. Each arrow beautifully illustrated and color-coded. Overall visual looks like a premium architectural diagram — perfect circular symmetry. Clean white background.",cap:"What if a farm produced no waste — only inputs for the next cycle?\n\nCircular agriculture is not a future concept. It is happening now on the world's most progressive farms.\n\nThe circular farm cycle:\n♻️ Crop residues → Composted → Returned as soil organic matter\n📦 Chemical containers → Collected → Recycled into new products\n💧 Irrigation runoff → Captured → Recirculated to fields\n🌿 Cover crops → Incorporated → Disease suppression + nitrogen fixation\n🌱 Harvest waste → Biochar → Carbon sequestration\n\nWe are redesigning our product stewardship programs to support every stage of this cycle.\n\nEmpty container collection. Dosage precision. Biodegradable packaging.\n\nThe farm of the future wastes nothing. Neither should we.\n\n#CircularEconomy #ZeroWasteFarm #SustainableAgriculture #CircularFarming",tags:["#Circular","#WasteToResource","#GreenFarming","#SDG12"],fmt:"Circular Economy Diagram — Premium Design",plt:"LinkedIn + Instagram + Pinterest"},

{d:26,p:"brand",c:"#BA7517",t:"Our Science Translated — What We Research, What It Means for You",s:"R&D communication bridge — making laboratory science human and accessible",concept:"Take complex internal R&D and translate it into plain-language human impact. Demonstrates scientific depth while remaining accessible to all audiences. Builds credibility simultaneously across farmers, investors, regulators, and the informed public worldwide.",visual:"Premium two-panel 'translation' design. Scientific journal meets human-interest magazine. LEFT PANEL dark, scientific: 'What our labs discovered' — molecular structure of a new bio-based active ingredient with full chemistry precision, electron microscope imagery of its mechanism, key trial data displayed. Dense, technical, impressive scientific authority. RIGHT PANEL warm, human: 'What this means for a farmer' — illustration of farmer confidently spraying, healthy thriving crop behind him, family visible in background, sunrise overhead. Simple direct language: 'A 40% more targeted molecule means 40% less collateral environmental impact.' CENTER BRIDGE: A DNA strand that transforms mid-image into a growing plant root. Confident premium typography.",cap:"Science without communication is incomplete.\nHere is what we learned this year — in plain language.\n\nWhat our R&D team discovered:\nA novel spirocyclic compound with a unique mode of action against lepidopteran pests — showing 97% efficacy with minimal impact on beneficial hymenoptera in controlled field trials.\n\nWhat this means for a farmer:\nA more targeted insecticide that controls caterpillars without harming the bees, wasps, and parasitic insects that are already protecting your crop naturally.\n\nWhat this means for the environment:\nA molecule that degrades 3x faster in soil than the current class average — leaving no persistent residue.\n\nWhat this means for the food system:\nFewer applications needed. Less chemical input. Same protection.\n\nThis is science with purpose.\n\n#AgriRD #CropScience #ScientificInnovation #MolecularAgronomy",tags:["#ResearchAndDevelopment","#AgriInnovation","#ScienceCommunication","#NewMolecule"],fmt:"Science Communication Bridge Graphic",plt:"LinkedIn + Company Blog + Instagram"},

{d:27,p:"food",c:"#D4537E",t:"Rice, Wheat, Maize — The Three Crops That Feed Humanity",s:"Global staple crop security — the civilizational stakes post",concept:"Anchor content on the three most critical global staple crops. Each faces significant pest and disease pressure threatening food security for billions of people. A powerful reminder of what's at stake and why crop protection science is not optional — it is civilizational.",visual:"Editorial triptych — three equal vertical panels. RICE PANEL: Golden aerial shot of terraced paddy fields in Southeast Asia at harvest. Hero pest overlay: Brown Planthopper scientific illustration. Disease overlay: Rice blast fungal spore microscopy. Stat: 'Rice feeds 3.5 billion people. 20% lost to pest and disease annually.' WHEAT PANEL: Vast golden prairie wheat field, combine harvesters on horizon. Hero disease: Wheat stem rust (Puccinia graminis) shown on infected stem with alarming rusty sporulation. Stat: 'Wheat is grown on more land than any other crop. Stem rust could cause 70% yield loss unchecked.' MAIZE PANEL: Great Plains towering maize field. Fall Armyworm larva close-up with identification markings. Stat: 'Climate change expanding FAW range by 1,600km per decade.' Bottom: 'Three crops. 7.5 billion people. That is why this science matters.'",cap:"Three crops. Three billion people.\n\n🌾 Rice: Feeds more than 3.5 billion people — the primary caloric source for most of Asia.\nBiggest threat: Brown Planthopper and Rice Blast fungus — capable of destroying entire paddies within weeks.\n\n🌿 Wheat: Grown on 220 million hectares — more land than any other crop on Earth.\nBiggest threat: Wheat stem rust Ug99 — capable of 70% yield loss. New strains emerging globally right now.\n\n🌽 Maize: World's highest production volume cereal crop.\nBiggest threat: Fall Armyworm — $9.4B annual loss in Africa alone, spreading to every continent.\n\nCombined, these three crops provide approximately 60% of the world's caloric intake.\n\nThe science of protecting them is not agricultural. It is civilizational.\n\n#Rice #Wheat #Maize #GlobalFoodSecurity #StapleCrops #CropProtection",tags:["#FoodCrops","#CropDisease","#GlobalAgriculture","#FoodSystem"],fmt:"Editorial Triptych Infographic",plt:"LinkedIn + Instagram + Twitter/X"},

{d:28,p:"nature",c:"#185FA5",t:"The Future Agrochemical — AI, Bioprecision, and RNA Science",s:"Next-decade crop protection technology — bold innovation vision post",concept:"Look boldly forward at the next decade of agricultural innovation. Positions the brand as a future-oriented science company, not a legacy chemicals business. Attracts talent, investors, and progressive farmers. Extremely high shareability across technology and agriculture communities worldwide.",visual:"Futuristic agricultural vision. Premium technology company aesthetic combined with agricultural science. THREE HERO TECHNOLOGY ILLUSTRATIONS: LEFT 'Artificial Intelligence' — sleek tablet showing AI-powered disease prediction field map, 14 days ahead of visible symptoms, predictive modeling visualization in stunning blues. CENTRE 'Precision Biologicals' — beneficial microbial consortium being precisely inoculated into soil shown as glowing intelligent living agents — scientific and beautiful simultaneously. RIGHT 'RNA-Based Crop Protection' — dsRNA molecule in elegant helix form, binding specifically to a pest-specific protein with molecular precision — completely inert to non-target organisms. Apple product launch meets CRISPR science documentary aesthetic. Dark premium background, glowing elements, clean white typography.",cap:"The crop protection industry of 2035 will be unrecognizable from today's.\n\nThree technologies that will define it:\n\n🤖 AI-Powered Predictive Agronomy\nMachine learning that predicts disease outbreaks 14+ days before visual symptoms — enabling preventive action at a fraction of the cost of reactive treatment.\n\n🦠 Precision Microbial Consortia\nCurated communities of beneficial organisms precisely formulated to outcompete specific pathogens in specific soil types. No chemistry. Pure biology.\n\n🧬 RNA-Interference (RNAi) Bioinsecticides\nDouble-stranded RNA molecules designed to silence specific genes in target pests — with no effect on any other organism on Earth. The most targeted crop protection science ever developed.\n\nThe future is not more chemistry.\nThe future is smarter biology.\n\nWe are investing in all three.\n\n#FutureOfFarming #AgriTech #RNAi #AIAgriculture #PrecisionBiology",tags:["#FutureTech","#BioControl","#ArtificialIntelligence","#InnovationInAgriculture"],fmt:"Future Vision Technology Triptych",plt:"LinkedIn + Instagram + Twitter/X"},

{d:29,p:"safety",c:"#E24B4A",t:"The Stewardship Pledge — Our Commitment to Every Person in the Value Chain",s:"Full supply chain responsibility — complete stewardship declaration",concept:"A comprehensive stewardship post showing the brand takes responsibility for every human in the value chain — from manufacturing workers to field farmers to consumers to waterway ecosystems. Defines the brand's complete accountability philosophy. Powerful ESG and investor relations content.",visual:"Elegant linear journey infographic. Clean premium white background. Flowing horizontal timeline showing the complete life of a product. STAGE 1 Raw Material Sourcing: illustrated with 'Responsible sourcing audit' badge. STAGE 2 Manufacturing: factory with 'Zero liquid discharge' and 'Worker safety first' badges. STAGE 3 Packaging: recyclable container with certification marks. STAGE 4 Distribution: temperature-controlled logistics with cold chain integrity indicators. STAGE 5 Farmer Application: PPE-equipped farmer with 'Training provided' badge. STAGE 6 In-Field Breakdown: soil cross-section showing rapid biodegradation curve. STAGE 7 Container Disposal: recycling stream illustration. STAGE 8 Residue Monitoring: quality laboratory testing food for MRL compliance. Above entire journey: 'We are responsible at every stage.' Bold, unambiguous, premium.",cap:"A product's responsibility does not begin when it is sprayed.\nAnd it does not end when the crop is harvested.\n\nOur stewardship pledge covers every stage:\n\n⛏️ Raw Materials: Ethical sourcing, full supply chain transparency\n🏭 Manufacturing: Worker health first. Zero liquid discharge.\n📦 Packaging: Recyclable containers. Empty container collection scheme.\n🚛 Distribution: Cold chain integrity. Zero counterfeit exposure.\n👨‍🌾 Application: PPE training. Dosage compliance. Safe storage guidance.\n🌱 Breakdown: Verified soil and water degradation profile published.\n🔬 Residue: MRL monitoring across all registered markets.\n\nBeing a responsible agrochemical company means being accountable for all of it.\n\nNot just the product that leaves our factory. But the world it enters.\n\n#Stewardship #ProductResponsibility #SupplyChain #ESG #CorporateAccountability",tags:["#ValueChain","#LifeCycleAssessment","#ResponsibleChemistry","#Stewardship","#ESG"],fmt:"Supply Chain Stewardship Graphic",plt:"LinkedIn + All Platforms"},

{d:30,p:"brand",c:"#BA7517",t:"30 Days. 30 Lessons. One Shared Mission.",s:"Month-end global manifesto — community celebration and forward vision",concept:"A month-close post that celebrates the content journey, synthesises the brand's core values, and builds anticipation for continued engagement. A manifesto-style closing post the global agricultural community will share widely. Emotional, authoritative, and forward-looking. The perfect brand capstone.",visual:"Grand magazine-quality brand statement visual. Premium dark forest-green background with architectural white typography and gold accents throughout. CENTER: A large circular mosaic — 30 small illustrated frames arranged in a perfect ring, each representing one post from the month — soil cross-sections, pest illustrations, farmer portraits across cultures, molecular diagrams, global maps, biopesticide illustrations. Inside the mosaic ring: Company logo rendered in gold. BELOW the mosaic: Brand manifesto in clean white typography — five powerful single-sentence statements. BOTTOM: A forward-looking horizon illustration — sunrise over a global agricultural landscape with healthy crops, restored forests, and thriving ecosystems visible together. Feels like the closing page of a Davos Economic Forum White Paper — authoritative, human, and hopeful.",cap:"Thirty days. Thirty windows into the world of agricultural science.\n\nWe shared the soil beneath your feet — teeming with a billion organisms per teaspoon.\nWe mapped the pests threatening harvests across six continents.\nWe put faces to the 500 million farming families who feed us all.\nWe examined our industry's failures — honestly.\nWe looked toward a future of RNA bioinsecticides, AI disease prediction, and regenerative soil restoration.\n\nBut if there is one thing these 30 days conveyed, it is this:\n\nThe science of growing food is not a commercial exercise. It is a moral one.\n\nBecause every hectare protected is a family fed.\nEvery pest controlled is a farmer's livelihood secured.\nEvery soil restored is a future generation's inheritance preserved.\n\nWe will continue to share, to learn, to be held accountable, and to improve.\n\nThank you for being part of this conversation.\nThe world's farmers deserve no less.\n\n#GlobalAgriculture #FarmerFirst #AgriculturalScience #FoodSecurity #BrandManifesto",tags:["#ThankYou","#AgriCommunity","#ScienceForFarmers","#MonthInReview","#Onward"],fmt:"Grand Closing Manifesto Graphic",plt:"All Global Platforms — Maximum Distribution"}
];

var pillars={science:"Science & Education",pest:"Pest & Crop Protection",sustain:"Sustainability",farmer:"Global Farmer Stories",nature:"Nature & Innovation",brand:"Brand & Thought Leadership",safety:"Safety & Responsibility",food:"Global Food Security"};
var sel=0,flt="all";

function buildLegend(){
  var l=document.getElementById("leg");l.innerHTML="";
  Object.keys(pillars).forEach(function(k){
    var p=P.find(function(x){return x.p===k});if(!p)return;
    var d=document.createElement("div");d.className="li";
    d.innerHTML='<div class="ld" style="background:'+p.c+'"></div>'+pillars[k];
    l.appendChild(d);
  });
}

function buildFilters(){
  var f=document.getElementById("fil");f.innerHTML="";
  var all=document.createElement("button");
  all.className="fb"+(flt==="all"?" active":"");
  all.textContent="All Posts";
  if(flt==="all")all.style.cssText="background:#0a2e1a;border-color:#0a2e1a";
  all.onclick=function(){flt="all";buildFilters();buildGrid()};
  f.appendChild(all);
  Object.keys(pillars).forEach(function(k){
    var p=P.find(function(x){return x.p===k});if(!p)return;
    var btn=document.createElement("button");
    btn.className="fb"+(flt===k?" active":"");
    btn.textContent=pillars[k].split(" ")[0];
    if(flt===k)btn.style.cssText="background:"+p.c+";border-color:"+p.c;
    btn.onclick=(function(key){return function(){flt=key;buildFilters();buildGrid()}})(k);
    f.appendChild(btn);
  });
}

function buildGrid(){
  var g=document.getElementById("grid");
  var old=g.querySelectorAll(".dc");
  for(var i=0;i<old.length;i++)old[i].remove();
  P.forEach(function(p,i){
    var vis=flt==="all"||p.p===flt;
    var c=document.createElement("div");
    c.className="dc"+(i===sel?" sel":"")+(vis?"":" dim");
    if(i===sel){c.style.borderColor=p.c;c.style.background=p.c+"11";}
    c.innerHTML='<div class="dn">'+p.d+'</div>'
      +'<div class="dp" style="background:'+p.c+'22;color:'+p.c+'">'+pillars[p.p].split(" ")[0]+'</div>'
      +'<div class="dtxt">'+p.t.substring(0,35)+'…</div>';
    (function(idx,visible){
      c.onclick=function(){if(!visible)return;sel=idx;buildGrid();buildPanel();};
    })(i,vis);
    g.appendChild(c);
  });
}

function buildPanel(){
  var p=P[sel];
  document.getElementById("panel").innerHTML=
    '<div class="ptop">'
    +'<div class="badge" style="background:'+p.c+'18;color:'+p.c+'">Day '+p.d+' — '+pillars[p.p]+'</div>'
    +'<h2>'+p.t+'</h2>'
    +'<div class="sub">'+p.s+'</div>'
    +'</div>'
    +'<div class="pbody">'
    +'<div class="sec"><div class="sl">Strategic Concept</div><div class="sc">'+p.concept+'</div></div>'
    +'<div class="sec"><div class="sl">Visual Art Direction & Illustration Blueprint</div><div class="vbox">'+p.visual+'</div></div>'
    +'<div class="sec"><div class="sl">Global Post Caption</div><div class="cbox">'+p.cap+'</div></div>'
    +'<div class="sec"><div class="sl">Hashtags</div><div class="tags">'+p.tags.map(function(h){return'<span class="tag">'+h+'</span>'}).join('')+'</div></div>'
    +'<div class="sec"><div class="sl">Format & Platform</div><div class="mtags"><span class="mt">📐 '+p.fmt+'</span><span class="mt">📱 '+p.plt+'</span></div></div>'
    +'<div class="navr"><button class="nb" onclick="nav(-1)">← Previous Day</button><button class="nb" onclick="nav(1)">Next Day →</button></div>'
    +'</div>';
}

function nav(d){
  var nx=sel+d;
  if(flt!=="all"){
    var vis=P.map(function(p,i){return p.p===flt?i:-1}).filter(function(i){return i>=0});
    var cur=vis.indexOf(sel);var ni=cur+d;
    if(ni>=0&&ni<vis.length)nx=vis[ni];else return;
  }else{nx=Math.max(0,Math.min(29,nx));}
  sel=nx;buildGrid();buildPanel();
  document.querySelector(".panel").scrollIntoView({behavior:"smooth",block:"start"});
}

buildLegend();buildFilters();buildGrid();buildPanel();
</script>
</body>
</html>
